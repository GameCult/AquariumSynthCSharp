completed_slices:
  - date: 2026-05-13
    summary: >
      Standardized the live envelope model as ADSR and added explicit Note
      records for frequency, one-shot gate duration, and host/MIDI source.
      SFXR sustain now maps to note gate duration; SFXR punch maps to non-unit
      sustain level only as compatibility import behavior. Generated Faust can
      emit one-shot ADSR envelopes or host gate/frequency controls.
    verification: "dotnet test AquariumSynthCSharp.slnx --no-restore: 39 passed"
  - date: 2026-05-13
    summary: >
      Added readable operator graph authoring syntax with `operator`, `route`,
      and `carrier` declarations, plus `env=ad:attack:decay` and
      `env=adsr:attack:decay:sustain:release` forms. Converted the DX7
      algorithm-8 rebuild away from compact number soup.
    verification: "dotnet test AquariumSynthCSharp.slnx --no-restore: 36 passed"
  - date: 2026-05-13
    summary: >
      Added first-class OperatorGraph support with operators, modulation edges,
      carriers, operator feedback, parser syntax, and Faust emission mixed with
      normal voices. Updated the DX7 algorithm-8 rebuild to use the operator
      graph; remaining pressure is exact DX7 feedback-register timing and
      rate/level envelopes.
    verification: "dotnet test AquariumSynthCSharp.slnx --no-restore: 35 passed"
  - date: 2026-05-13
    summary: >
      Added ReferenceRebuild catalog entries and two DX7-style Aquarium DSL
      rebuilds. Algorithm 32 maps cleanly to six additive voices; algorithm 8
      exposes missing operator graph concepts including explicit modulation
      edges, summed modulators, and operator-local self-feedback.
    verification: "dotnet test AquariumSynthCSharp.slnx --no-restore: 34 passed"
  - date: 2026-05-13
    summary: >
      Added DX7 algorithm topology metadata for algorithms 1-32 from the
      reverse-engineered OPS algorithm ROM table. Topology exposes carrier
      operators, modulation edges, feedback-register writers, self-feedback
      operators, delayed-feedback targets, raw ROM steps, and ReferencePatch
      feature pressure.
    verification: "dotnet test AquariumSynthCSharp.slnx --no-restore: 31 passed"
  - date: 2026-05-13
    summary: >
      Added DX7 SysEx records and parsing for 155-byte voice edit buffers,
      128-byte packed voices, and 4104-byte packed 32-voice banks. Extracted
      operators, envelopes, algorithm, feedback, oscillator sync, LFO,
      transpose, voice name, checksum validation, and ReferencePatch features.
    verification: "dotnet test AquariumSynthCSharp.slnx --no-restore: 28 passed"
  - date: 2026-05-13
    summary: >
      Added PatchParameter and ReferencePatch contracts, `param` script parsing,
      duplicate path validation, and Faust hslider emission for declared
      controls. Parameter binding uses field-site references such as
      `lpf=@/macro/brightness`; the emitter substitutes the parameter only at
      the exact bound field site and warns for unbound parameters.
    verification: "dotnet test AquariumSynthCSharp.slnx --no-restore: 23 passed"

cut_line:
  - "Cut any importer that cannot state source provenance and license."
  - "Cut weak tests that only prove parser leniency."
  - "Cut voice-field sprawl when a target needs topology."
  - "Cut any design that requires recompiling a patch to move an exposed musical parameter."
  - "Split a lower-level graph DSL if Faust/Cardinal-style references make the voice DSL lie."
