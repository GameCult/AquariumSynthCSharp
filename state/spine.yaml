  parser: src/AquariumSynth.Dsl/PatchScript.cs
  model: src/AquariumSynth.Dsl/Model.cs
  faust_emitter: src/AquariumSynth.Dsl/FaustExport.cs
  faust_renderer: src/AquariumSynth.Dsl/FaustExport.cs
  operator_graph_model: src/AquariumSynth.Dsl/Model.cs
  analysis: src/AquariumSynth.Dsl/AudioAnalysis.cs
  built_ins: src/AquariumSynth.Dsl/BuiltInScripts.cs
  dx7_references: src/AquariumSynth.Dsl/Dx7SysEx.cs
