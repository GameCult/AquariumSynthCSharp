completed_slices:
  - date: 2026-05-15
    summary: >
      Fixed Organ Choir's violin-vs-wind source-table mismatch by mapping Zyn
      OscilGen base-function phase modulation and adaptive harmonics. Kit1's
      `base_function=7` source also has `base_function_modulation=1` and
      `adaptive_harmonics=1`; ignoring them produced a smooth bowed-string
      harmonic ramp. The importer now phase-warps the base function before DFT
      and remaps the prepared oscillator spectrum at the selected PAD table
      root. Kit1 table energy now lands near the Zyn body/air balance
      (400-800 Hz 0.2713 vs 0.2780; 8-16 kHz 0.1471 vs 0.1355), and Organ
      improves to log-mel 0.471483 / score 0.541933 without changing accepted
      DoublePadBass, Ghost, or Soft Pad.
    verification: "dotnet test AquaSynth.slnx --no-restore: 107 passed"
  - date: 2026-05-15
    summary: >
      Mapped Organ Choir's remaining PAD voice-alignment issue to two real Zyn
      authorities instead of a gain shove: kit0 uses analog HP2 with six-pole
      high-pass order and FILTER_ENVELOPE cutoff motion, while kit1 uses
      OscilGen `base_function=7` and needs the selected note table root. The
      survey now records sample-0 and selected PAD table roots, but the
