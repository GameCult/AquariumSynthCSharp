prime_directive: >
  Build coherent synth machinery. References exist to reveal missing structure,
  not to justify piling parameters onto the current patch DSL.

current_objective: >
  Turn AquaSynth into a reference-driven patch authoring and Faust
  generation library. Use external synths and DSP corpora as pressure tests so
  AquaSynth's DSL grows only when a real target proves the abstraction belongs.

