project: AquariumSynthCSharp
mission: >
  C# authoring, analysis, and Faust generation layer for Aquarium synth patches,
  targeting the Aquarium/Vortice engine path without dragging the Rust renderer
  into runtime dependencies.
surfaces:
  instructions: AGENTS.md
  doctrine: docs/audio-doctrine.md
  memory: state/memory.json
  scratch: state/scratch.md
  evidence: state/evidence.jsonl
  spine: state/spine.yaml
  solution: AquariumSynthCSharp.slnx
  library: src/AquariumSynth.Dsl
  patch_library: patches
  tests: tests/AquariumSynth.Dsl.Tests
  reference_roadmap: docs/reference-synth-roadmap.md
  dx7_public_domain_fixtures: tests/AquariumSynth.Dsl.Tests/Fixtures/Dx7/PublicDomain
  zyn_reference_source: external/zynaddsubfx
  zyn_upstream_instrument_bank: external/zynaddsubfx/instruments
  zyn_reference_build_script: tools/zyn-reference/build-zyn-reference.ps1
  zyn_pad_reference_renderer: tools/zyn-reference/ZynPadReference.cpp
  zyn_reference_build_patches: tools/zyn-reference/patches
  zyn_project_fixtures: tests/AquariumSynth.Dsl.Tests/Fixtures/ZynAddSubFX/ProjectAuthored
  package: AquariumSynth.Dsl 0.1.0-aquarium.1
modules:
  model: src/AquariumSynth.Dsl/Model.cs
  parser: src/AquariumSynth.Dsl/PatchScript.cs
  faust: src/AquariumSynth.Dsl/FaustExport.cs
  faust_rendering: src/AquariumSynth.Dsl/FaustExport.cs
  dx7_reference_render_tests: tests/AquariumSynth.Dsl.Tests/Dx7ReferenceParityTests.cs
  zyn_reference_reader: src/AquariumSynth.Dsl/ZynInstrument.cs
  package_boundary_tests: tests/AquariumSynth.Dsl.Tests/PackageBoundaryTests.cs
  sfxr: src/AquariumSynth.Dsl/SfxrParams.cs
  analysis: src/AquariumSynth.Dsl/AudioAnalysis.cs
  scoring: src/AquariumSynth.Dsl/ScriptMetrics.cs
  presets: src/AquariumSynth.Dsl/Presets.cs
  built_in_scripts: src/AquariumSynth.Dsl/BuiltInScripts.cs
boundaries:
  leave_in_rust:
    - sample renderer
    - PatchPlayer runtime
    - realtime AudioUnit bridge
    - experimental Rust DSL compiler branch
  own_in_csharp:
    - patch graph contracts
    - patch script surface
    - SFXR parameter mapping and atoms
    - analysis and comparison tools
    - script scoring
    - Faust source generation, target-code generation, and candidate rendering
  dev_only:
    - public-domain DX7 SysEx fixtures
    - pinned GPL ZynAddSubFX source for parity tests
    - project-authored ZynAddSubFX .xiz fixtures
    - dexed-py reference renderer
    - structured .aqua patch library
checks:
  default: dotnet test
  package: dotnet pack src/AquariumSynth.Dsl/AquariumSynth.Dsl.csproj -c Release
  faust_validation: automatic in tests when Faust is installed
  dexed_py_reference: optional in tests when AQUARIUM_DX7_PYTHON or a Python with dexed-py is available
  zyn_reference_source: pinned submodule used only for parity tests; never package content
  zyn_upstream_instrument_bank: nested GPL submodule used only for test/development pressure surveys and oracle renders; never package content
