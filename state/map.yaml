project: AquaSynth
mission: >
  C# authoring, analysis, and Faust generation layer for AquaSynth patches,
  targeting the AquaSynth/Vortice engine path without dragging the Rust renderer
  into runtime dependencies.
surfaces:
  instructions: AGENTS.md
  doctrine: docs/audio-doctrine.md
  memory: state/memory.json
  scratch: state/scratch.md
  evidence: state/evidence.jsonl
  spine: state/spine.yaml
  solution: AquaSynth.sln
  core_library: src/AquaSynth.Core
  faust_library: src/AquaSynth.Faust
  patch_library: patches
  tests: tests/AquaSynth.Dsl.Tests
  reference_roadmap: docs/reference-synth-roadmap.md
  faust_toolchain_boundary: docs/faust-toolchain-boundary.md
  dx7_public_domain_fixtures: tests/AquaSynth.Dsl.Tests/Fixtures/Dx7/PublicDomain
  zyn_reference_source: external/zynaddsubfx
  zyn_upstream_instrument_bank: external/zynaddsubfx/instruments
  zyn_reference_build_script: tools/zyn-reference/build-zyn-reference.ps1
  zyn_pad_reference_renderer: tools/zyn-reference/ZynPadReference.cpp
  zyn_voice_reference_renderer: tools/zyn-reference/ZynVoiceReference.cpp
  zyn_reference_build_patches: tools/zyn-reference/patches
  zyn_project_fixtures: tests/AquaSynth.Dsl.Tests/Fixtures/ZynAddSubFX/ProjectAuthored
  core_package: AquaSynth.Core 0.1.0-alpha.2
  faust_package: AquaSynth.Faust 0.1.0-alpha.2
modules:
  model: src/AquaSynth.Core/Model.cs
  parser: src/AquaSynth.Core/PatchScript.cs
  faust_emitter: src/AquaSynth.Core/FaustExport.cs
  faust_compiler: src/AquaSynth.Faust/FaustCompiler.cs
  native_faust_runtime: src/AquaSynth.Faust/NativeFaustRuntime.cs
  dx7_reference_render_tests: tests/AquaSynth.Dsl.Tests/Dx7ReferenceParityTests.cs
  zyn_reference_reader: src/AquaSynth.Core/ZynInstrument.cs
  zyn_coverage_survey: src/AquaSynth.Core/ZynInstrument.cs
  package_boundary_tests: tests/AquaSynth.Dsl.Tests/PackageBoundaryTests.cs
  sfxr: src/AquaSynth.Core/SfxrParams.cs
  analysis: src/AquaSynth.Core/AudioAnalysis.cs
  scoring: src/AquaSynth.Core/ScriptMetrics.cs
  presets: src/AquaSynth.Core/Presets.cs
  built_in_scripts: src/AquaSynth.Core/BuiltInScripts.cs
boundaries:
  leave_in_rust:
    - sample renderer
    - PatchPlayer runtime
    - realtime AudioUnit bridge
    - experimental Rust DSL compiler branch
  own_in_csharp:
    - patch graph contracts
    - patch script surface
    - SFXR parameter mapping and atoms
    - analysis and comparison tools
    - script scoring
    - Faust source generation in AquaSynth.Core
    - target-code generation, compile-product contracts, dynamic patch compilation policy, cache identity, generated artifact manifests, and Faust toolchain selection in AquaSynth.Faust
    - native Faust factory lifetime and offline sample-buffer rendering for engine hosts in AquaSynth.Faust
  dev_only:
    - public-domain DX7 SysEx fixtures
    - pinned GPL ZynAddSubFX source for parity tests
    - project-authored ZynAddSubFX .xiz fixtures
    - dexed-py reference renderer
    - structured .aqua patch library
checks:
  default: dotnet test
  core_package: dotnet pack src/AquaSynth.Core/AquaSynth.Core.csproj -c Release
  faust_package: dotnet pack src/AquaSynth.Faust/AquaSynth.Faust.csproj -c Release
  faust_validation: automatic in tests when Faust is installed
  dexed_py_reference: optional in tests when AQUASYNTH_DX7_PYTHON or a Python with dexed-py is available
  zyn_reference_source: pinned submodule used only for parity tests; never package content
  zyn_upstream_instrument_bank: nested GPL submodule used only for test/development pressure surveys and oracle renders; never package content

